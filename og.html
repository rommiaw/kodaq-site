<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #F8F7F3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #402E1F;
    -webkit-font-smoothing: antialiased;
  }
  .wordmark {
    font-weight: 800;
    font-stretch: 75%;
    font-size: 150px;
    letter-spacing: 6px;
    line-height: 1;
    margin: 0;
  }
  .rule {
    width: 88px;
    height: 7px;
    background: #F4B400;
    margin: 30px 0 0;
  }
  .tagline {
    font-weight: 700;
    font-size: 46px;
    line-height: 1.18;
    text-align: center;
    margin: 54px 0 0;
  }
  .data {
    font-family: "SF Mono", Menlo, ui-monospace, monospace;
    font-weight: 400;
    font-size: 23px;
    letter-spacing: 1px;
    color: #8C7352;
    margin: 46px 0 0;
  }
</style>
</head>
<body>
  <h1 class="wordmark">KODAQ</h1>
  <div class="rule"></div>
  <p class="tagline">Don't let your camera<br>take you out of the moment.</p>
  <p class="data">Shoot 24 shots. &nbsp;Develop to reveal when the roll is full.</p>
</body>
</html>
